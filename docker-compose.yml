services:
  compreface-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: compreface
      POSTGRES_PASSWORD: compreface
      POSTGRES_DB: compreface
    volumes:
      - compreface-db:/var/lib/postgresql/data
    restart: unless-stopped

  compreface-admin:
    image: exadel/compreface-admin:1.2.0
    environment:
      POSTGRES_USER: compreface
      POSTGRES_PASSWORD: compreface
      POSTGRES_URL: jdbc:postgresql://compreface-postgres:5432/compreface
      ADMIN_JAVA_OPTS: -Xmx2g
    depends_on:
      - compreface-postgres
    restart: unless-stopped

  compreface-api:
    image: exadel/compreface-api:1.2.0
    ports:
      - "8000:8080"
    environment:
      POSTGRES_USER: compreface
      POSTGRES_PASSWORD: compreface
      POSTGRES_URL: jdbc:postgresql://compreface-postgres:5432/compreface
      API_JAVA_OPTS: -Xmx2g
    depends_on:
      - compreface-postgres
      - compreface-admin
    restart: unless-stopped

  compreface-core:
    image: exadel/compreface-core:1.2.0
    environment:
      POSTGRES_USER: compreface
      POSTGRES_PASSWORD: compreface
      POSTGRES_URL: jdbc:postgresql://compreface-postgres:5432/compreface
      CORE_JAVA_OPTS: -Xmx2g
    depends_on:
      - compreface-postgres
      - compreface-admin
    restart: unless-stopped

  nudenet:
    build: ./services/nudenet
    ports:
      - "5001:5001"
    restart: unless-stopped

  # Full stack — enable with: docker compose --profile full up -d --build
  app:
    profiles: ["full"]
    build: .
    ports:
      - "3000:3000"
    environment:
      DEMO_MODE: ${DEMO_MODE:-true}
      COMPREFACE_URL: http://compreface-api:8080
      COMPREFACE_API_KEY: ${COMPREFACE_API_KEY:-}
      NUDENET_URL: http://nudenet:5001
      NUDENET_ENABLED: "true"
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      FACECHECK_API_KEY: ${FACECHECK_API_KEY:-}
      SERPAPI_KEY: ${SERPAPI_KEY:-}
      YANDEX_SEARCH_API_KEY: ${YANDEX_SEARCH_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - app-data:/app/.data
    depends_on:
      - compreface-api
      - nudenet
    restart: unless-stopped

volumes:
  compreface-db:
  app-data: